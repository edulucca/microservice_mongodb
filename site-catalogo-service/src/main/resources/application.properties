spring.application.name=site-catalogo-service

server.port=8080

spring.data.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/${MONGO_DB}?appName=Cluster0&retryWrites=true&w=majority

spring.config.import=optional:file:.env.properties

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.main.allow-bean-definition-overriding=true