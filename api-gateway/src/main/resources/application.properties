server.port=8081
spring.application.name=api-gateway

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.routes[0].id=site-catalogo-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://SITE-CATALOGO-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/sites,/api/sites/**

logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.loadbalancer=TRACE
logging.level.reactor.netty=DEBUG